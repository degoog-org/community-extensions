<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Awesome degoog extensions</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("ade:theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <link
      rel="icon"
      href="https://github.com/fccview/degoog/raw/main/src/public/images/degoog-logo.png"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <div class="ade-layout">
      <header class="ade-mobile-header">
        <button id="ade-burger" type="button" class="ade-btn ade-btn-burger">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="ade-mobile-title-container">
          <a href="/community-extensions" class="ade-mobile-title-link">
            <span class="ade-mobile-title">Degoog community extensions</span>
          </a>
        </div>
      </header>
      <div class="ade-content">
        <aside class="ade-sidebar">
          <div class="ade-sidebar-brand">
            <img
              src="https://github.com/fccview/degoog/raw/main/src/public/images/degoog-logo.png"
              alt="degoog logo"
              class="ade-brand-img"
              onerror="this.style.display = 'none'"
            />
            <a href="/community-extensions" class="ade-brand-name"
              >Degoog Community Extensions</a
            >
          </div>
          <div class="ade-sidebar-search">
            <input
              id="ade-search"
              class="ade-input"
              type="search"
              placeholder="Search all extensions..."
              autocomplete="off"
            />
          </div>
          <nav id="ade-nav" class="ade-nav" aria-label="Stores"></nav>
          <div class="ade-sidebar-actions">
            <button id="ade-refresh" type="button" class="ade-btn">
              <i class="fa-solid fa-arrows-rotate"></i>
            </button>
            <button id="ade-theme-toggle" type="button" class="ade-btn">
              <i class="fa-solid fa-circle-half-stroke"></i>
            </button>
          </div>
        </aside>
        <main id="ade-main" class="ade-main"></main>
      </div>
      <div id="ade-backdrop" class="ade-backdrop"></div>
    </div>
    <dialog id="ade-lightbox" class="ade-lightbox">
      <button type="button" class="ade-lightbox-close" aria-label="Close">
        &times;
      </button>
      <img alt="" />
    </dialog>
    <script src="assets/libraries/marked.min.js"></script>
    <script type="module" src="assets/js/main.js"></script>
  </body>
</html>
